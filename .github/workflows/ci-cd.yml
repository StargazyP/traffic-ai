name: Traffic AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Static check (compile)
        run: python -m compileall app traffic_data_api

      - name: Validate traffic_data_api imports
        working-directory: traffic_data_api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import main"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build traffic_data_api image (CI)
        uses: docker/build-push-action@v6
        with:
          context: traffic_data_api
          file: traffic_data_api/Dockerfile
          push: false
          tags: traffic-data-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via Webhook
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Call deployment webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "WEBHOOK_SECRET repository secret is required."
            exit 1
          fi

          url="${WEBHOOK_URL:-}"
          if [ -z "${url}" ]; then
            if [ -z "${SSH_HOST}" ]; then
              echo "Set WEBHOOK_URL or SSH_HOST repository secret."
              exit 1
            fi
            url="http://${SSH_HOST}:3000/webhook"
          fi

          payload='{"ref":"${{ github.ref }}","head_commit":{"id":"${{ github.sha }}"},"repository":{"full_name":"${{ github.repository }}","name":"${{ github.event.repository.name }}"}}'
          signature="sha256=$(printf '%s' "${payload}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -hex | awk '{print $2}')"

          curl -fsS -X POST "${url}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: ${signature}" \
            -d "${payload}" \
            --max-time 60 \
            --connect-timeout 10
